name: Auto-assign

# Automatically assign every new PR (and issue) to the repo owner. CODEOWNERS
# handles review requests; this handles the assignee field.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign to csmarshall
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'csmarshall';
            const isPR = !!context.payload.pull_request;
            const number = isPR ? context.payload.pull_request.number
                                : context.payload.issue.number;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: number,
              assignees: [owner],
            });

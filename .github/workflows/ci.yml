name: CI

on:
  push:
  pull_request:

jobs:
  # ── Fast checks: syntax, import, CLI smoke ──────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install .

      - name: Syntax check
        run: python -m py_compile link_ctl.py tools/validate.py link_usb.py link_usb_macos.py scripts/bump_version.py scripts/update_formula.py

      - name: Import check
        run: python -c "import link_ctl"

      - name: Help
        run: link-ctl --help

      - name: Subcommand help
        # Derive subcommand list from `--help` output so the test can't drift
        # from the live parser (pre-v2 this list was hard-coded and still
        # mentioned `privacy` after we removed it).
        run: |
          link-ctl --help | python3 -c "
          import re, sys
          m = re.search(r'{([\w,\-]+)}', sys.stdin.read())
          print('\n'.join(m.group(1).split(',')))
          " > /tmp/cmds.txt
          cat /tmp/cmds.txt
          while read -r cmd; do
            link-ctl "$cmd" --help > /dev/null
          done < /tmp/cmds.txt

  # ── Homebrew formula install (macOS) ────────────────────────────────────────
  brew:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Clone into Homebrew's taps dir so the formula is inside a proper
          # tap. Modern Homebrew (4.x+) refuses `brew install <file>` outside
          # a tap with "Homebrew requires formulae to be in a tap".
          path: homebrew-link-ctl

      - name: Register as local tap
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/csmarshall"
          ln -s "$GITHUB_WORKSPACE/homebrew-link-ctl" \
                "$(brew --repository)/Library/Taps/csmarshall/homebrew-link-ctl"
          brew tap-info csmarshall/link-ctl

      - name: Install formula from source
        run: brew install --build-from-source csmarshall/link-ctl/link-ctl

      - name: Run formula test
        run: brew test csmarshall/link-ctl/link-ctl
